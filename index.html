<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Square Matrix Inverse Calculator</title>

<style>
body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#f4f6f9;
}

.container{
    width:90%;
    max-width:900px;
    margin:30px auto;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

h1{
    text-align:center;
    color:#0d6efd;
}

label{
    font-weight:bold;
}

input[type=number]{
    width:70px;
    padding:6px;
}

button{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    background:#0d6efd;
    color:white;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#084298;
}

table{
    border-collapse:collapse;
    margin-top:20px;
}

td{
    border:1px solid #ccc;
    padding:4px;
}

td input{
    width:70px;
    padding:6px;
    text-align:center;
}

#result{
    margin-top:30px;
}

.inverse-table td{
    padding:10px;
    background:#eef6ff;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="container">

<h1>Square Matrix Inverse Calculator</h1>

<label>Matrix Size:</label>
<input type="number" id="size" min="2" max="8" value="3">

<button onclick="createMatrix()">Create Matrix</button>

<div id="matrix"></div>

<button onclick="inverse()">Compute Inverse</button>

<div id="result"></div>

</div>

<script>

function createMatrix(){

let n=parseInt(document.getElementById("size").value);

let html="<table>";

for(let i=0;i<n;i++){

html+="<tr>";

for(let j=0;j<n;j++){

html+=`<td><input type='number' id='a${i}${j}' value='0'></td>`;

}

html+="</tr>";

}

html+="</table>";

document.getElementById("matrix").innerHTML=html;

}

createMatrix();

function inverse(){

let n=parseInt(document.getElementById("size").value);

let A=[];

for(let i=0;i<n;i++){

A[i]=[];

for(let j=0;j<n;j++){

A[i][j]=parseFloat(document.getElementById(`a${i}${j}`).value);

}

}

let aug=[];

for(let i=0;i<n;i++){

aug[i]=[];

for(let j=0;j<n;j++)
aug[i][j]=A[i][j];

for(let j=0;j<n;j++)
aug[i][j+n]=(i==j)?1:0;

}

for(let i=0;i<n;i++){

let pivot=aug[i][i];

if(pivot==0){

let swap=-1;

for(let k=i+1;k<n;k++){

if(aug[k][i]!=0){

swap=k;

break;

}

}

if(swap==-1){

document.getElementById("result").innerHTML=
"<h2 style='color:red'>Matrix is NOT invertible.</h2>";

return;

}

let temp=aug[i];
aug[i]=aug[swap];
aug[swap]=temp;

pivot=aug[i][i];

}

for(let j=0;j<2*n;j++)
aug[i][j]/=pivot;

for(let k=0;k<n;k++){

if(k!=i){

let factor=aug[k][i];

for(let j=0;j<2*n;j++)
aug[k][j]-=factor*aug[i][j];

}

}

}

let html="<h2>Inverse Matrix</h2>";

html+="<table class='inverse-table'>";

for(let i=0;i<n;i++){

html+="<tr>";

for(let j=n;j<2*n;j++){

html+=`<td>${aug[i][j].toFixed(4)}</td>`;

}

html+="</tr>";

}

html+="</table>";

document.getElementById("result").innerHTML=html;

}

</script>

</body>
</html>
